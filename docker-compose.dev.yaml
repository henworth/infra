# Cross-repo local dev stack. Assumes the `pantry` and `shopping-list` repos are
# checked out as siblings of `infra/`, e.g.
#   workspace/
#     infra/        (this repo)
#     pantry/
#     shopping-list/
# Run from inside this directory:
#   docker compose -f docker-compose.dev.yaml up --build
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: postgres
    volumes:
      - postgres:/var/lib/postgresql
      - ./scripts/init-dev-dbs.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pantry:
    build: ../pantry
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/pantry_db
      API_PREFIX: /pantry
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    volumes:
      - ../pantry/app:/app/app:ro
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8000/pantry/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  shopping-list:
    build: ../shopping-list
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/shopping_db
      API_PREFIX: /shopping
      PANTRY_INTERNAL_URL: http://pantry:8000/pantry
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    volumes:
      - ../shopping-list/app:/app/app:ro
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8000/shopping/healthz || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      pantry:
        condition: service_healthy

volumes:
  postgres:
